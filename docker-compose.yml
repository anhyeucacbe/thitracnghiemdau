version: '3.8'

services:

  app:
    build: .

    container_name: thitracnghiem_app

    restart: always

    ports:
      - "8080:80"

    depends_on:
      - mysql



  mysql:

    image: mysql:8.0

    container_name: thitracnghiem_mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: 123456

      MYSQL_DATABASE: thitracnghiem

    ports:
      - "3307:3306"

    volumes:

      - mysql-data:/var/lib/mysql

volumes:

  mysql-data: